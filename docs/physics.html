<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Physics</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .phys-wrap { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-start; }
    .phys-stage {
      background: #0f1016;
      border: 1px solid var(--border, #333);
      border-radius: 4px;
      flex: 0 0 auto;
    }
    .phys-stage canvas { display: block; }
    .phys-col {
      flex: 1 1 380px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .phys-toolbar {
      display: flex; gap: 0.5rem; align-items: center;
      font-size: 0.8rem; color: var(--fg-dim);
      flex-wrap: wrap;
    }
    .phys-toolbar select, .phys-toolbar button {
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.25rem 0.7rem;
    }
    .phys-status {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      color: var(--fg-dim);
      min-height: 1em;
      white-space: pre-wrap;
    }
    .phys-status.err { color: #ff6666; }
    .phys-status.ok { color: #8ec07c; }
  </style>
</head>
<body>
  <main>
    <h2>Physics</h2>
    <p>
      <code>rapier2d</code> and <code>rapier3d</code> bound into cljrs as
      opaque values. Same Clojure source runs natively and in the browser —
      this page is the WASM build of the cljrs tree-walker driving
      rigid-body simulations. Pick a scene or edit the source; it re-applies
      as you type.
    </p>

    <div class="phys-wrap">
      <div class="phys-stage">
        <canvas id="phys-canvas" width="560" height="420"></canvas>
      </div>
      <div class="phys-col">
        <div class="phys-toolbar">
          <label for="phys-demo">Scene:</label>
          <select id="phys-demo"></select>
          <button id="phys-pause">Pause</button>
          <button id="phys-reset">Reset</button>
          <span id="phys-fps">—</span>
        </div>
        <div class="repl" id="phys-editor-wrap">
          <div id="phys-editor" style="height:380px;width:100%"></div>
          <div class="repl-toolbar" style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
            <span id="phys-vim-status" style="font-family:ui-monospace,monospace;font-size:0.75rem;color:var(--fg-dim)"></span>
            <label style="font-size:0.75rem;color:var(--fg-dim)">
              <input type="checkbox" id="phys-vim-toggle"> vim mode
            </label>
          </div>
        </div>
        <div id="phys-status" class="phys-status"></div>
      </div>
    </div>
  </main>
  <script type="module">
    import { mountChrome, loadWasm, makeEditor, attachAltDragScrub, loadMonaco } from "./_layout.js";
    mountChrome();

    // --- demo definitions ------------------------------------------------

    const DEMO_BOXES_2D = `(require '[cljrs.physics.d2 :as p2])

(def world (p2/world {:gravity [0 -20]}))

;; floor + angled walls
(p2/add-body! world {:type :fixed :position [0 -6]
                     :collider {:shape :box :half-extents [14 0.4]}})
(p2/add-body! world {:type :fixed :position [-12 0] :rotation 0.3
                     :collider {:shape :box :half-extents [6 0.3]}})
(p2/add-body! world {:type :fixed :position [12 0] :rotation -0.3
                     :collider {:shape :box :half-extents [6 0.3]}})

(def bodies
  (vec
    (for [i (range 18)]
      (p2/add-body! world
                    {:type :dynamic
                     :position [(- (* i 1.2) 10)
                                (+ 6 (mod i 3))]
                     :rotation (* i 0.13)
                     :collider {:shape :box
                                :half-extents [0.5 0.5]
                                :restitution 0.15
                                :friction 0.6}}))))

(defn frame! []
  (p2/step! world)
  (mapv (fn [b]
          (let [[x y] (p2/translation world b)
                r     (p2/rotation world b)]
            [x y r]))
        bodies))`;

    const DEMO_TOWER_2D = `(require '[cljrs.physics.d2 :as p2])

;; a tall Jenga-ish stack. First dynamic box is slightly off-center
;; so the tower collapses with dramatic flair.
(def world (p2/world {:gravity [0 -25]}))

(p2/add-body! world {:type :fixed :position [0 -6]
                     :collider {:shape :box :half-extents [14 0.4]}})

(def bodies
  (vec
    (for [layer (range 14)
          col   (range 3)]
      (let [y  (+ -5 (* layer 1.02))
            x  (+ (- (* col 1.02) 1.02)
                  (if (zero? layer) 0.08 0))]
        (p2/add-body! world
                      {:type :dynamic
                       :position [x y]
                       :collider {:shape :box
                                  :half-extents [0.5 0.5]
                                  :friction 0.8
                                  :restitution 0.0}})))))

(defn frame! []
  (p2/step! world)
  (mapv (fn [b]
          (let [[x y] (p2/translation world b)
                r     (p2/rotation world b)]
            [x y r]))
        bodies))`;

    const DEMO_BALLS_2D = `(require '[cljrs.physics.d2 :as p2])

;; high-restitution pinballs in a wedge — they keep bouncing for a long
;; time because restitution is near 1 and friction is near 0.
(def world (p2/world {:gravity [0 -22]}))

(p2/add-body! world {:type :fixed :position [0 -6]
                     :collider {:shape :box :half-extents [12 0.3]
                                :restitution 0.95}})
(p2/add-body! world {:type :fixed :position [-10 0] :rotation 0.9
                     :collider {:shape :box :half-extents [8 0.3]
                                :restitution 0.95}})
(p2/add-body! world {:type :fixed :position [10 0] :rotation -0.9
                     :collider {:shape :box :half-extents [8 0.3]
                                :restitution 0.95}})
(p2/add-body! world {:type :fixed :position [0 2] :rotation 0
                     :collider {:shape :ball :radius 0.9
                                :restitution 1.0}})

(def balls
  (vec
    (for [i (range 30)]
      (p2/add-body! world
                    {:type :dynamic
                     :position [(- (mod i 6) 2.5)
                                (+ 6 (* 0.3 (quot i 6)))]
                     :linvel [(* 5 (- 0.5 (/ (mod i 7) 7.0)))
                              (* -3 (/ (mod i 3) 3.0))]
                     :collider {:shape :ball
                                :radius 0.35
                                :restitution 0.95
                                :friction 0.02
                                :density 0.6}}))))

(defn frame! []
  (p2/step! world)
  (mapv (fn [b]
          (let [[x y] (p2/translation world b)]
            [x y 0.35]))
        balls))`;

    const DEMO_EXPLOSION_3D = `(require '[cljrs.physics.d3 :as p3])

;; a 3D firework: 90 spheres start tightly packed at the origin, each
;; with a strong outward velocity. Walls contain the blast so you can
;; watch ricochets pile up.
(def world (p3/world {:gravity [0 -6 0]}))

;; floor + 4 walls (an arena)
(p3/add-body! world {:type :fixed :position [0 -5 0]
                     :collider {:shape :box :half-extents [14 0.3 14]
                                :restitution 0.6}})
(p3/add-body! world {:type :fixed :position [14 0 0]
                     :collider {:shape :box :half-extents [0.3 6 14]
                                :restitution 0.8}})
(p3/add-body! world {:type :fixed :position [-14 0 0]
                     :collider {:shape :box :half-extents [0.3 6 14]
                                :restitution 0.8}})
(p3/add-body! world {:type :fixed :position [0 0 14]
                     :collider {:shape :box :half-extents [14 6 0.3]
                                :restitution 0.8}})
(p3/add-body! world {:type :fixed :position [0 0 -14]
                     :collider {:shape :box :half-extents [14 6 0.3]
                                :restitution 0.8}})

;; 90 balls from a fibonacci-sphere distribution, each launched outward
(def balls
  (vec
    (for [i (range 90)]
      (let [phi  (* i 2.399963)            ; golden angle
            y    (- 1.0 (/ (* i 2.0) 89.0)) ; -1..1
            r    (sqrt (max 0.0001 (- 1.0 (* y y))))
            dx   (* r (cos phi))
            dz   (* r (sin phi))
            speed 18.0]
        (p3/add-body! world
                      {:type :dynamic
                       :position [(* 0.2 dx) (+ 1 (* 0.2 y)) (* 0.2 dz)]
                       :linvel [(* speed dx) (* speed y) (* speed dz)]
                       :collider {:shape :ball
                                  :radius 0.28
                                  :restitution 0.75
                                  :friction 0.05
                                  :density 0.8}})))))

(defn frame! []
  (p3/step! world)
  (mapv (fn [b]
          (let [[x y z] (p3/translation world b)]
            [x y z 0.28]))
        balls))`;

    const DEMO_ORBIT_3D = `(require '[cljrs.physics.d3 :as p3])

;; a gravity well: no global gravity, each frame we apply an inward
;; impulse toward the origin, strength ~ 1/r^2 like a point mass.
;; 35 balls start on rings at varied radii with tangential velocities
;; tuned for roughly-circular orbits; collisions between them turn the
;; ring into a simmering disc.
(def world (p3/world {:gravity [0 0 0]}))

;; one big static sphere at center as a visual anchor + collider
(p3/add-body! world {:type :fixed :position [0 0 0]
                     :collider {:shape :ball :radius 0.8
                                :restitution 0.3}})

(def balls
  (vec
    (for [i (range 35)]
      (let [ring (quot i 12)
            r    (+ 3 (* 1.3 ring))
            th   (* (mod i 12) 0.5236)
            x    (* r (cos th))
            z    (* r (sin th))
            y    (* 0.15 (- (mod i 3) 1))
            speed (* 1.3 (sqrt (/ 12.0 r)))
            vx   (* speed (- (sin th)))
            vz   (* speed (cos th))]
        (p3/add-body! world
                      {:type :dynamic
                       :position [x y z]
                       :linvel [vx 0 vz]
                       :collider {:shape :ball
                                  :radius 0.28
                                  :restitution 0.6
                                  :friction 0.1
                                  :density 1.0}})))))

(defn frame! []
  ;; inward pull toward origin, clipped so near-center bodies don't
  ;; explode out (1/r^2 blows up near 0).
  (doseq [b balls]
    (let [[x y z] (p3/translation world b)
          r2 (max 1.0 (+ (* x x) (* y y) (* z z)))
          k  (/ 3.2 r2)]
      (p3/apply-impulse! world b
                         [(* k (- x)) (* k (- y)) (* k (- z))])))
  (p3/step! world)
  (mapv (fn [b]
          (let [[x y z] (p3/translation world b)]
            [x y z 0.28]))
        balls))`;

    // --- rendering -------------------------------------------------------

    const W = 560, H = 420;
    const CX = W / 2, CY = H / 2 + 20;

    function render2dBoxes(ctx, floats, statics, PPU, halfExt) {
      ctx.fillStyle = "#222633";
      for (const [x, y, r, hx, hy] of statics) {
        const sx = CX + x * PPU, sy = CY - y * PPU;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(-r);
        ctx.fillRect(-hx * PPU, -hy * PPU, hx * 2 * PPU, hy * 2 * PPU);
        ctx.restore();
      }
      const S = halfExt * PPU;
      ctx.fillStyle = "#6cf";
      ctx.strokeStyle = "#cde";
      ctx.lineWidth = 1;
      for (let i = 0; i < floats.length; i += 3) {
        const sx = CX + floats[i] * PPU, sy = CY - floats[i + 1] * PPU;
        const r = floats[i + 2];
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(-r);
        ctx.fillRect(-S, -S, S * 2, S * 2);
        ctx.strokeRect(-S, -S, S * 2, S * 2);
        ctx.restore();
      }
    }

    function render2dBalls(ctx, floats, statics, PPU) {
      ctx.fillStyle = "#222633";
      for (const stat of statics) {
        const [x, y, r, hx, hy, shape] = stat;
        const sx = CX + x * PPU, sy = CY - y * PPU;
        if (shape === "ball") {
          ctx.beginPath();
          ctx.arc(sx, sy, hx * PPU, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.save();
          ctx.translate(sx, sy);
          ctx.rotate(-r);
          ctx.fillRect(-hx * PPU, -hy * PPU, hx * 2 * PPU, hy * 2 * PPU);
          ctx.restore();
        }
      }
      ctx.fillStyle = "#fc8";
      ctx.strokeStyle = "#ffe0c0";
      ctx.lineWidth = 1;
      for (let i = 0; i < floats.length; i += 3) {
        const sx = CX + floats[i] * PPU;
        const sy = CY - floats[i + 1] * PPU;
        const rad = floats[i + 2] * PPU;
        ctx.beginPath();
        ctx.arc(sx, sy, rad, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    // Oblique projection for 3D: z offsets x and y, depth-tinted fill.
    function render3dSpheres(ctx, floats, statics3d, PPU) {
      const PX = 0.4, PY = 0.3;
      function proj(x, y, z) {
        return [CX + (x - PX * z) * PPU, CY - (y - PY * z) * PPU];
      }
      // static geometry (floor top face + optionally a center ball)
      for (const s of statics3d) {
        const [cx, cy, cz, hx, hy, hz, shape] = s;
        if (shape === "ball") {
          const [sx, sy] = proj(cx, cy, cz);
          ctx.fillStyle = "#3a3d4a";
          ctx.strokeStyle = "#60657a";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(sx, sy, hx * PPU, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          continue;
        }
        ctx.fillStyle = "#1b1d26";
        ctx.strokeStyle = "#343846";
        const corners = [
          [cx - hx, cy + hy, cz - hz],
          [cx + hx, cy + hy, cz - hz],
          [cx + hx, cy + hy, cz + hz],
          [cx - hx, cy + hy, cz + hz],
        ];
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const [sx, sy] = proj(...corners[i]);
          if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
      // dynamic bodies: sort by (z - y) so near-camera draws last
      const n = Math.floor(floats.length / 4);
      const order = new Array(n);
      for (let i = 0; i < n; i++) order[i] = i;
      order.sort((a, b) => {
        const za = floats[a * 4 + 2] - floats[a * 4 + 1];
        const zb = floats[b * 4 + 2] - floats[b * 4 + 1];
        return za - zb;
      });
      for (const idx of order) {
        const x = floats[idx * 4];
        const y = floats[idx * 4 + 1];
        const z = floats[idx * 4 + 2];
        const r = floats[idx * 4 + 3];
        const [sx, sy] = proj(x, y, z);
        // color: far → cool blue, near → warm orange
        const depth = Math.max(0, Math.min(1, (z + 12) / 24));
        const rch = Math.floor(80 + 160 * (1 - depth));
        const gch = Math.floor(140 + 40 * depth);
        const bch = Math.floor(200 - 80 * (1 - depth));
        ctx.fillStyle = `rgb(${rch}, ${gch}, ${bch})`;
        ctx.strokeStyle = "#e0e8f0";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(2, r * PPU), 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    const DEMOS = {
      "2d-boxes": {
        label: "2D · boxes on ramps",
        source: DEMO_BOXES_2D,
        statics: [
          [0, -6, 0, 14, 0.4],
          [-12, 0, 0.3, 6, 0.3],
          [12, 0, -0.3, 6, 0.3],
        ],
        render: (ctx, f, s) => render2dBoxes(ctx, f, s, 20, 0.5),
      },
      "2d-tower": {
        label: "2D · Jenga tower",
        source: DEMO_TOWER_2D,
        statics: [[0, -6, 0, 14, 0.4]],
        render: (ctx, f, s) => render2dBoxes(ctx, f, s, 22, 0.5),
      },
      "2d-pinball": {
        label: "2D · bouncy pinball wedge",
        source: DEMO_BALLS_2D,
        // [x, y, r, hx, hy, shape?]
        statics: [
          [0, -6, 0, 12, 0.3, "box"],
          [-10, 0, 0.9, 8, 0.3, "box"],
          [10, 0, -0.9, 8, 0.3, "box"],
          [0, 2, 0, 0.9, 0.9, "ball"],
        ],
        render: (ctx, f, s) => render2dBalls(ctx, f, s, 22),
      },
      "3d-explosion": {
        label: "3D · firework explosion",
        source: DEMO_EXPLOSION_3D,
        // [cx, cy, cz, hx, hy, hz, shape?]
        statics3d: [
          [0, -5, 0, 14, 0.3, 14, "box"],
        ],
        render: (ctx, f, s, s3d) => render3dSpheres(ctx, f, s3d, 14),
      },
      "3d-orbit": {
        label: "3D · gravity well",
        source: DEMO_ORBIT_3D,
        statics3d: [
          [0, 0, 0, 0.8, 0.8, 0.8, "ball"],
        ],
        render: (ctx, f, s, s3d) => render3dSpheres(ctx, f, s3d, 28),
      },
    };

    // --- page wiring -----------------------------------------------------

    const canvas = document.getElementById("phys-canvas");
    const ctx = canvas.getContext("2d");
    let editor = null;
    const select = document.getElementById("phys-demo");
    const status = document.getElementById("phys-status");
    const fpsEl = document.getElementById("phys-fps");
    const pauseBtn = document.getElementById("phys-pause");
    const resetBtn = document.getElementById("phys-reset");

    for (const key of Object.keys(DEMOS)) {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = DEMOS[key].label;
      select.appendChild(opt);
    }

    let repl = null;
    let paused = false;
    let currentDemo = null;
    let lastFloats = new Float32Array(0);
    let suppressApply = false;

    function applySource(src) {
      if (!repl) return;
      status.className = "phys-status";
      status.textContent = "…";
      try {
        repl.reset();
        const result = repl.eval(src);
        if (result.startsWith("read error") || result.startsWith("eval error")) {
          status.className = "phys-status err";
          status.textContent = result;
          lastFloats = new Float32Array(0);
        } else {
          status.className = "phys-status ok";
          status.textContent = "applied.";
        }
      } catch (e) {
        status.className = "phys-status err";
        status.textContent = String(e);
        lastFloats = new Float32Array(0);
      }
    }

    function loadDemo(key) {
      currentDemo = DEMOS[key];
      // setValue triggers onApply (debounced); call applySource directly
      // and suppress the queued auto-apply so we don't double-eval.
      suppressApply = true;
      editor.setValue(currentDemo.source);
      // Re-allow apply after the debounce flushes.
      setTimeout(() => { suppressApply = false; }, 600);
      applySource(currentDemo.source);
    }

    function clearAndDraw() {
      ctx.fillStyle = "#0f1016";
      ctx.fillRect(0, 0, W, H);
      if (!currentDemo) return;
      const statics2d = currentDemo.statics || [];
      const statics3d = currentDemo.statics3d || [];
      currentDemo.render(ctx, lastFloats, statics2d, statics3d);
    }

    let lastT = performance.now();
    let emaFps = 60;
    function tick(now) {
      const dt = now - lastT;
      lastT = now;
      if (dt > 0) emaFps = emaFps * 0.92 + (1000 / dt) * 0.08;
      fpsEl.textContent = `${emaFps.toFixed(0)} fps`;

      if (!paused && repl && currentDemo) {
        try {
          lastFloats = repl.eval_floats("(frame!)");
        } catch (e) {
          status.className = "phys-status err";
          status.textContent = String(e);
          paused = true;
          pauseBtn.textContent = "Resume";
        }
      }
      clearAndDraw();
      requestAnimationFrame(tick);
    }

    select.addEventListener("change", () => loadDemo(select.value));
    pauseBtn.addEventListener("click", () => {
      paused = !paused;
      pauseBtn.textContent = paused ? "Resume" : "Pause";
    });
    resetBtn.addEventListener("click", () => {
      applySource(editor.getValue());
    });

    (async () => {
      const mod = await loadWasm();
      repl = new mod.Repl();
      editor = await makeEditor(document.getElementById("phys-editor"), {
        value: DEMOS["2d-boxes"].source,
        onApply: (src) => { if (!suppressApply) applySource(src); },
        debounceMs: 500,
        vimToggleEl: document.getElementById("phys-vim-toggle"),
        vimStatusEl: document.getElementById("phys-vim-status"),
        vimKey: "physics",
      });
      const monaco = await loadMonaco();
      attachAltDragScrub(editor, monaco);
      select.value = "2d-boxes";
      loadDemo("2d-boxes");
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
